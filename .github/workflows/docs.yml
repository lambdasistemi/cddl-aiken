name: Deploy docs

on:
  push:
    branches: [main]

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  deploy:
    runs-on: nixos
    steps:
      - uses: actions/checkout@v6

      - uses: cachix/cachix-action@v15
        with:
          name: paolino
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Deploy docs
        run: nix develop --quiet -c just deploy-docs
