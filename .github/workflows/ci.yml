name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: nixos
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/cachix-action@v15
        with:
          name: paolino
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Format check
        run: nix develop --quiet -c just format-check

      - name: HLint
        run: nix develop --quiet -c just hlint

      - name: Build
        run: nix develop --quiet -c just build

      - name: Test
        run: nix develop --quiet -c cabal test unit-tests -O0 --test-show-details=direct
